name: Build Android App (APK)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build and Compile APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Create .env file
      run: |
        if [ -n "${{ secrets.GEMINI_API_KEY }}" ]; then
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
        else
          echo "GEMINI_API_KEY=MY_GEMINI_API_KEY" > .env
        fi
        if [ -n "${{ secrets.SUPABASE_URL }}" ]; then
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
        else
          echo "SUPABASE_URL=https://your-project.supabase.co" >> .env
        fi
        if [ -n "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
        else
          echo "SUPABASE_ANON_KEY=your_supabase_anon_key" >> .env
        fi

    - name: Decode Keystore
      run: base64 -d debug.keystore.base64 > debug.keystore

    - name: Build Debug APK
      run: gradle assembleDebug --no-daemon

    - name: Upload Compiled APK
      uses: actions/upload-artifact@v4
      with:
        name: Al-Ahmadi-Store-APK
        path: app/build/outputs/apk/debug/app-debug.apk
